<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق استماع القرآن الكريم</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1>🎵 استماع القرآن الكريم</h1>
            <button class="share-btn" onclick="copyAppLink()">🔗 نسخ رابط التطبيق</button>
        </header>

        <!-- Readers Section -->
        <div class="readers-section">
            <h2>اختر القارئ المفضل</h2>
            <div class="readers-grid">
                <button class="reader-btn reader-ajmi" onclick="selectReader('ajmi')" data-color="#0CAF00">
                    <img src="https://via.placeholder.com/80/0CAF00/ffffff?text=احمد+العجمي" alt="احمد العجمي" class="reader-img">
                    <h3>احمد العجمي</h3>
                    <p class="color-indicator">🟢 أخضر بارد</p>
                </button>

                <button class="reader-btn reader-yamani" onclick="selectReader('yamani')" data-color="#87CEEB">
                    <img src="https://via.placeholder.com/80/87CEEB/000000?text=وديع+اليمني" alt="وديع حمادي" class="reader-img">
                    <h3>وديع حمادي</h3>
                    <p class="color-indicator">🔵 أزرق فاتح</p>
                </button>

                <button class="reader-btn reader-nafis" onclick="selectReader('nafis')" data-color="#FF3333">
                    <img src="https://via.placeholder.com/80/FF3333/ffffff?text=احمد+النفيس" alt="احمد النفيس" class="reader-img">
                    <h3>احمد النفيس</h3>
                    <p class="color-indicator">🔴 أحمر</p>
                </button>

                <button class="reader-btn reader-jilani" onclick="selectReader('jilani')" data-color="#9B59B6">
                    <img src="https://via.placeholder.com/80/9B59B6/ffffff?text=خالد+الجليل" alt="خالد الجليل" class="reader-img">
                    <h3>خالد الجليل</h3>
                    <p class="color-indicator">🟣 بنفسجي</p>
                </button>
            </div>
        </div>

        <!-- Surahs List -->
        <div class="surahs-section">
            <h2>قائمة السور</h2>
            <input type="text" id="searchInput" placeholder="ابحث عن سورة..." class="search-input">
            <div class="surahs-list" id="surahsList"></div>
        </div>

        <!-- Player Section -->
        <div class="player-section" id="playerSection" style="display: none;">
            <div class="player-header">
                <button class="close-btn" onclick="closePlayer()">✕</button>
                <h2 id="surahName"></h2>
                <p id="readerName"></p>
            </div>

            <!-- Audio Player -->
            <div class="player-container">
                <div class="progress-section">
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill"></div>
                        <div class="progress-circle" id="progressCircle"></div>
                        <input type="range" id="progressSlider" class="progress-slider" min="0" max="100" value="0">
                    </div>

                    <div class="time-display">
                        <span id="currentTime">0:00</span>
                        <span id="duration">0:00</span>
                    </div>
                </div>

                <div class="player-controls">
                    <button class="control-btn main-btn" onclick="togglePlayPause()" id="playPauseBtn">▶️</button>
                    <button class="control-btn" onclick="repeatToggle()" id="repeatBtn" title="تكرار السورة">🔄</button>
                    <button class="control-btn" onclick="downloadSurah()" title="تحميل السورة">⬇️</button>
                    <button class="control-btn" onclick="toggleAutoPlay()" id="autoPlayBtn" title="التشغيل التلقائي">🔁</button>
                </div>

                <div class="volume-control">
                    <label>🔊 مستوى الصوت:</label>
                    <input type="range" id="volumeSlider" min="0" max="100" value="70" onchange="setVolume()">
                    <span id="volumePercent">70%</span>
                </div>

                <audio id="audioPlayer"></audio>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
